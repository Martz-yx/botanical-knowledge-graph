version: '3.8'

services:
  neo4j:
    image: neo4j:5
    container_name: botanical-knowledge-graph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/import
      - ./neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/localdevpass
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "localdevpass", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
